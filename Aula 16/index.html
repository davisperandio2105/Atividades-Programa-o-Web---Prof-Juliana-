<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Torneio E-sports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand fw-bold">Torneio Universitário de E-sports</span>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">Inscrição do Jogador</h2>
        
        <form id="formCadastro">
          <div class="mb-3">
            <label class="form-label fw-bold">Nome / Nickname</label>
            <input type="text" id="inputNome" class="form-control" placeholder="Digite seu nome ou nick">
            <div id="erroNome" class="text-danger small d-none">Nome obrigatório.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">E-mail</label>
            <input type="text" id="inputEmail" class="form-control" placeholder="Digite seu e-mail">
            <div id="erroEmail" class="text-danger small d-none">E-mail obrigatório ou formato inválido.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Jogo Principal</label>
            <select id="inputJogo" class="form-select">
              <option value="">Selecione o jogo...</option>
              <option value="valorant">Valorant</option>
              <option value="cs2">Counter-Strike 2</option>
            </select>
            <div id="erroJogo" class="text-danger small d-none">Selecione uma modalidade.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">CEP de Residência</label>
            <input type="text" id="inputCEP" class="form-control" placeholder="00000000" maxlength="8">
            <div id="statusCEP" class="text-primary small mt-1 d-flex align-items-center gap-2">
              <div id="spinnerCEP" class="spinner-border spinner-border-sm d-none" role="status"></div>
              <span id="textoStatusCEP"></span>
            </div>
            <div id="erroCEP" class="text-danger small d-none">CEP inválido.</div>
          </div>

          <div class="row">
            <div class="col-md-8 mb-3">
              <label class="form-label fw-bold">Logradouro</label>
              <input type="text" id="logradouro" class="form-control" readonly placeholder="Preenchido automaticamente">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">Número</label>
              <input type="text" id="inputNumero" class="form-control" placeholder="Ex: 123">
              <div id="erroNumero" class="text-danger small d-none">Obrigatório.</div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-5 mb-3">
              <label class="form-label fw-bold">Bairro</label>
              <input type="text" id="bairro" class="form-control" readonly placeholder="Preenchido automaticamente">
            </div>
            <div class="col-md-5 mb-3">
              <label class="form-label fw-bold">Cidade</label>
              <input type="text" id="cidade" class="form-control" readonly placeholder="Preenchido automaticamente">
            </div>
            <div class="col-md-2 mb-3">
              <label class="form-label fw-bold">UF</label>
              <input type="text" id="uf" class="form-control" readonly placeholder="UF" maxlength="2">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-2 fw-bold">Confirmar Inscrição</button>

          <div id="mensagemSucesso" class="alert alert-success mt-3 d-none"></div>
          <div id="mensagemErro" class="alert alert-danger mt-3 d-none">Preencha todos os campos corretamente para confirmar sua vaga.</div>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
